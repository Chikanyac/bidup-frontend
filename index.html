<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp - Zimbabwe Vehicle Auctions</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#0a7c5a;
  --brand-dark:#065f46;
}
body{font-family:Outfit, sans-serif; background:#f8fafc;}
.glass{backdrop-filter:blur(14px);}
</style>
</head>

<body class="text-slate-800">

<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 glass border-b">
  <div class="max-w-7xl mx-auto flex items-center justify-between p-4">

    <div class="flex flex-col leading-tight">
      <h1 class="text-2xl font-black text-[var(--brand)]">BidUp</h1>
      <span style="font-size:10px; letter-spacing:0.2em; font-weight:800; color:#065f46;">
        BID. WIN. DRIVE.
      </span>
    </div>

    <div class="flex items-center gap-3">
      <div id="userBadge" class="hidden text-sm font-bold text-green-700"></div>

      <button id="loginBtn" onclick="toggleAuth(true)"
        class="bg-[var(--brand)] text-white px-4 py-2 rounded-xl text-sm font-bold">
        Login
      </button>

      <button id="logoutBtn" onclick="logout()"
        class="hidden bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">
        Logout
      </button>
    </div>

  </div>
</header>

<section class="pt-28 bg-gradient-to-br from-[#0a7c5a] to-emerald-700 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-4xl md:text-6xl font-black">
      Zimbabwe's Trusted<br>Vehicle Auction Marketplace
    </h2>
  </div>
</section>

<section class="max-w-7xl mx-auto px-6 py-12">
  <h3 class="text-2xl font-bold mb-6">Live Auctions</h3>

  <div id="auctionGrid" class="grid md:grid-cols-3 gap-6">
    <div class="text-slate-500">Loading auctions...</div>
  </div>
</section>

<!-- LOGIN MODAL -->
<div id="authModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl">

    <h2 class="text-2xl font-bold mb-4">Login / Register</h2>

    <input id="email" class="w-full border p-3 rounded-xl mb-3" placeholder="Email">
    <input id="password" type="password" class="w-full border p-3 rounded-xl mb-3" placeholder="Password">

    <button onclick="login()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold mb-2">
      Login
    </button>

    <button onclick="register()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">
      Register
    </button>

    <button onclick="toggleAuth(false)" class="mt-3 text-sm w-full">
      Close
    </button>

  </div>
</div>

<script>
const socket = io("https://api.bidup.co.zw");

let currentUser = JSON.parse(localStorage.getItem("user")) || null;

/* =====================
   SOCKET CONNECTION
===================== */
socket.on("connect", () => {
  console.log("✅ Connected:", socket.id);
});

socket.onAny((event, data) => {
  console.log("📡 EVENT:", event, data);
});

/* =====================
   UI STATE
===================== */
function updateUI(){
  const badge = document.getElementById("userBadge");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  if(currentUser){
    badge.classList.remove("hidden");
    loginBtn.classList.add("hidden");
    logoutBtn.classList.remove("hidden");
    badge.textContent = "👤 " + currentUser.name;
  } else {
    badge.classList.add("hidden");
    loginBtn.classList.remove("hidden");
    logoutBtn.classList.add("hidden");
  }
}

function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  currentUser = null;
  updateUI();
}

/* =====================
   AUTH
===================== */
function toggleAuth(show){
  document.getElementById("authModal").classList.toggle("hidden", !show);
}

async function register(){
  await fetch("https://api.bidup.co.zw/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: email.value.split("@")[0],
      email: email.value,
      password: password.value
    })
  });

  alert("Registered. Please login.");
}

async function login(){
  const res = await fetch("https://api.bidup.co.zw/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    currentUser = data.user;

    toggleAuth(false);
    updateUI();
  }
}

/* =====================
   AUCTIONS UI
===================== */
function createCarCard(car){
  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-2xl shadow";
  div.dataset.carId = car._id;

  div.innerHTML = `
    <img src="${car.image || ''}" class="rounded-xl mb-3 h-40 w-full object-cover">

    <h3 class="font-bold text-lg">${car.title}</h3>

    <p class="text-sm text-slate-500">Status: ${car.status}</p>

    <p class="text-xl font-bold text-green-700 current"
       data-price="${car.currentPrice}">
      $${car.currentPrice}
    </p>

    <button onclick="bid(this)"
      class="mt-3 w-full bg-[var(--brand)] text-white py-2 rounded-xl font-bold">
      Place Bid
    </button>
  `;

  /* JOIN AUCTION ROOM */
  socket.emit("joinAuction", car._id);

  return div;
}

/* =====================
   BIDDING
===================== */
function bid(btn){
  if(!currentUser){
    toggleAuth(true);
    return;
  }

  const card = btn.closest("[data-car-id]");
  const priceEl = card.querySelector(".current");

  let price = parseInt(priceEl.dataset.price) + 100;

  socket.emit("placeBid", {
    auctionId: card.dataset.carId,
    bidAmount: price,
    userId: currentUser._id
  });
}

/* =====================
   SOCKET EVENTS
===================== */
socket.on("initAuctions", (auctions)=>{
  const grid = document.getElementById("auctionGrid");
  grid.innerHTML = "";
  auctions.forEach(a => grid.appendChild(createCarCard(a)));
});

socket.on("bidUpdated", (data)=>{
  const card = document.querySelector(`[data-car-id="${data.auctionId}"]`);
  if(!card) return;

  const priceEl = card.querySelector(".current");
  priceEl.dataset.price = data.currentPrice;
  priceEl.textContent = "$" + data.currentPrice.toLocaleString();
});

socket.on("auctionEnded", (data)=>{
  const card = document.querySelector(`[data-car-id="${data.auctionId}"]`);
  if(!card) return;

  card.innerHTML += `
    <div class="mt-3 p-2 bg-red-100 text-red-700 rounded-xl font-bold">
      Auction Closed
    </div>
  `;
});

/* INIT */
updateUI();
</script>

</body>
</html>
