<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp V3 Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{ --brand:#0a7c5a; }
body{font-family:Outfit,sans-serif;background:#f8fafc;}
.glass{backdrop-filter:blur(12px);}
.bid-flash { animation: flash 0.6s ease; }
@keyframes flash {
  0% { background: #dcfce7; }
  100% { background: transparent; }
}
</style>
</head>

<body class="text-slate-800">

<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 glass border-b">
  <div class="max-w-7xl mx-auto flex justify-between p-4">
    <div>
      <h1 class="text-2xl font-black text-[var(--brand)]">BidUp</h1>
      <span class="text-[10px] font-bold tracking-[0.2em] text-green-700">BID. WIN. DRIVE.</span>
    </div>
  </div>
</header>

<div id="dashboardNav" class="max-w-7xl mx-auto mt-24 px-6 flex gap-2">
  <button onclick="showTab('home')" class="bg-green-600 text-white px-3 py-2 rounded">Home</button>
  <button onclick="showTab('auctions')" class="bg-slate-800 text-white px-3 py-2 rounded">Auctions</button>
</div>

<section id="tab-home" class="max-w-7xl mx-auto px-6 py-10">
  <h3 class="text-2xl font-bold mb-4">Live Auctions</h3>
  <div id="auctionGrid" class="grid md:grid-cols-3 gap-6"></div>
</section>

<section id="tab-auctions" class="hidden max-w-7xl mx-auto px-6 py-10">
  <h3 class="text-2xl font-bold">Real-Time Auction Feed</h3>
  <div id="liveFeed" class="mt-4 space-y-3"></div>
</section>

<script>
const socket = io("https://api.bidup.co.zw", {
  transports: ["polling"]
});

/* =========================
   SAFE AUCTION STATE
========================= */
let auctionState = {
  1: { title: "Toyota Hilux 2019", bid: 18500 },
  2: { title: "Honda Fit 2020", bid: 9800 },
  3: { title: "Mazda CX-5 2018", bid: 14200 }
};

let socketConnected = false;

/* =========================
   RENDER (SAFE)
========================= */
function renderAuctions() {
  const grid = document.getElementById("auctionGrid");
  if (!grid) return;

  grid.innerHTML = Object.entries(auctionState).map(([id, car]) => `
    <div id="car-${id}" class="bg-white border rounded-xl p-4 shadow-sm">
      <h3 class="font-bold text-lg">${car.title}</h3>

      <p class="text-sm text-slate-500 mt-1">Live auction</p>

      <div class="mt-3">
        <p class="text-xs text-slate-500">Current Bid</p>
        <p class="text-2xl font-bold text-green-600" id="bid-${id}">
          $${car.bid.toLocaleString()}
        </p>
      </div>

      <button class="mt-3 bg-green-600 text-white px-3 py-2 rounded text-sm">
        Bid Now
      </button>
    </div>
  `).join("");
}

/* =========================
   SAFE UPDATE
========================= */
function updateBid(id, newBid) {
  if (!auctionState[id]) return;

  auctionState[id].bid = newBid;

  const el = document.getElementById(`bid-${id}`);
  if (!el) return;

  el.textContent = "$" + newBid.toLocaleString();
  el.classList.add("bid-flash");

  setTimeout(() => el.classList.remove("bid-flash"), 500);
}

/* =========================
   SOCKET
========================= */
socket.on("connect", () => {
  socketConnected = true;
  console.log("Socket connected");
});

socket.on("auction:update", (data) => {
  updateBid(data.id, data.bid);
});

/* =========================
   ONLY RUN SIMULATION IF NO SOCKET DATA FLOW
========================= */
function startDemoBidding() {
  if (socketConnected) return;

  setInterval(() => {
    const ids = Object.keys(auctionState);
    const randomId = ids[Math.floor(Math.random() * ids.length)];

    auctionState[randomId].bid += Math.floor(Math.random() * 250 + 50);
    updateBid(randomId, auctionState[randomId].bid);

  }, 4000);
}

/* =========================
   TAB SYSTEM (SAFE)
========================= */
function showTab(tab) {
  document.querySelectorAll("section[id^='tab']").forEach(s => {
    if (s) s.classList.add("hidden");
  });

  const target = document.getElementById("tab-" + tab);
  if (target) target.classList.remove("hidden");

  if (tab === "home") {
    renderAuctions();
  }
}

/* =========================
   INIT (CRITICAL FIX)
========================= */
window.addEventListener("DOMContentLoaded", () => {
  renderAuctions();
  startDemoBidding();
  showTab("home");
});
</script>

</body>
</html>
