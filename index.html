<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp - Zimbabwe Vehicle Auctions</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#0a7c5a;
}
body{
  font-family: Outfit, sans-serif;
  background:#f8fafc;
}
.glass{
  backdrop-filter: blur(14px);
}
</style>
</head>

<body class="text-slate-800">

<!-- ================= HEADER ================= -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 glass border-b">
  <div class="max-w-7xl mx-auto flex items-center justify-between p-4">

    <div>
      <h1 class="text-2xl font-black text-[var(--brand)]">BidUp</h1>
      <p class="text-[10px] tracking-widest font-bold text-emerald-700">
        BID. WIN. DRIVE.
      </p>
    </div>

    <div class="flex items-center gap-3">

      <!-- USER BADGE -->
      <div id="userBadge" class="text-sm font-bold text-slate-700"></div>

      <button id="authBtn"
        onclick="toggleAuth(true)"
        class="bg-[var(--brand)] text-white px-4 py-2 rounded-xl text-sm font-bold">
        Login
      </button>

      <button id="logoutBtn"
        onclick="logout()"
        class="hidden bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">
        Logout
      </button>

    </div>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="pt-28 bg-gradient-to-br from-[#0a7c5a] to-emerald-700 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-5xl font-black">
      Zimbabwe Vehicle Auctions
    </h2>
    <p class="mt-3 text-white/80">
      Live bidding. Real winners. Secure marketplace.
    </p>
  </div>
</section>

<!-- ================= AUCTIONS ================= -->
<section class="max-w-7xl mx-auto px-6 py-10">

  <h3 class="text-2xl font-bold mb-4">Live Auctions</h3>

  <div id="auctionGrid" class="grid md:grid-cols-3 gap-6"></div>

</section>

<!-- ================= SELL ================= -->
<section class="bg-slate-50 py-16">
  <div class="max-w-4xl mx-auto px-6">
    <h3 class="text-3xl font-bold mb-6">Sell Vehicle</h3>

    <div class="bg-white p-6 rounded-2xl shadow space-y-3">
      <input id="title" class="w-full border p-3 rounded-xl" placeholder="Title">
      <input id="image" class="w-full border p-3 rounded-xl" placeholder="Image URL">
      <input id="price" class="w-full border p-3 rounded-xl" placeholder="Starting Price">

      <button onclick="createAuction()"
        class="w-full bg-[var(--brand)] text-white py-3 rounded-xl font-bold">
        Create Auction
      </button>
    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="bg-slate-900 text-white p-10 text-center text-sm">
  © 2026 BidUp
</footer>

<!-- ================= LOGIN MODAL ================= -->
<div id="authModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl">

    <h2 class="text-xl font-bold mb-4">Login</h2>

    <input id="email" class="w-full border p-3 rounded-xl mb-3" placeholder="Email">
    <input id="password" type="password" class="w-full border p-3 rounded-xl mb-3" placeholder="Password">

    <button onclick="login()"
      class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
      Login
    </button>

    <button onclick="register()"
      class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold mt-2">
      Register
    </button>

    <button onclick="toggleAuth(false)"
      class="w-full mt-3 text-sm text-slate-500">
      Close
    </button>

  </div>
</div>

<script>

const socket = io("https://bidup-phlw.onrender.com");

const state = {
  user: null,
  token: localStorage.getItem("token"),
  auctions: []
};

// ================= AUTH =================
function toggleAuth(show){
  document.getElementById("authModal").classList.toggle("hidden", !show);
}

async function register(){
  await fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Registered");
}

async function login(){
  const res = await fetch("https://bidup-phlw.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    state.token = data.token;
    state.user = data.user;

    localStorage.setItem("token", data.token);

    updateUserUI();
    toggleAuth(false);
  }
}

// ================= USER UI =================
function updateUserUI(){
  if(state.user){
    userBadge.innerText = "👤 " + state.user.name;
    authBtn.classList.add("hidden");
    logoutBtn.classList.remove("hidden");
  }
}

function logout(){
  localStorage.removeItem("token");
  state.user = null;
  state.token = null;

  userBadge.innerText = "";
  authBtn.classList.remove("hidden");
  logoutBtn.classList.add("hidden");
}

// ================= AUCTIONS =================
function createCarCard(car){

  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-2xl shadow";
  div.dataset.carId = car.carId;

  div.innerHTML = `
    <img src="${car.image}" class="rounded-xl h-40 w-full object-cover"/>

    <h4 class="font-bold mt-2">${car.title}</h4>

    <p class="text-xl font-black current" data-price="${car.currentPrice}">
      $${car.currentPrice}
    </p>

    <p class="text-sm text-slate-500 bidder">
      Highest Bidder: -
    </p>

    <p class="text-xs mt-1 text-red-500">
      Status: ${car.status}
    </p>

    <button onclick="bid(this)"
      class="mt-3 w-full bg-[var(--brand)] text-white py-2 rounded-xl">
      Place Bid
    </button>
  `;

  return div;
}

function renderAuctions(list){
  auctionGrid.innerHTML = "";
  list.forEach(a => auctionGrid.appendChild(createCarCard(a)));
}

// ================= BIDDING =================
function bid(btn){

  const card = btn.closest("[data-car-id]");
  const priceEl = card.querySelector(".current");

  let price = parseInt(priceEl.dataset.price) + 100;

  if(!state.token){
    alert("Login required");
    toggleAuth(true);
    return;
  }

  socket.emit("placeBid", {
    carId: card.dataset.carId,
    amount: price,
    token: state.token
  });
}

// ================= SOCKET EVENTS =================
socket.on("initAuctions", (data) => {
  state.auctions = data;
  renderAuctions(data);
});

socket.on("newAuction", (a) => {
  auctionGrid.appendChild(createCarCard(a));
});

socket.on("bidUpdate", (data) => {

  const card = document.querySelector(`[data-car-id="${data.carId}"]`);
  if(!card) return;

  card.querySelector(".current").innerText = "$" + data.amount;
  card.querySelector(".current").dataset.price = data.amount;

  const bidder = card.querySelector(".bidder");
  if(bidder) bidder.innerText = "Highest Bidder: " + data.user;
});

// ================= AUCTION CLOSED =================
socket.on("auctionClosed", (a) => {

  const card = document.querySelector(`[data-car-id="${a.carId}"]`);
  if(!card) return;

  card.querySelector("button").disabled = true;
  card.querySelector("button").innerText = "Closed";

  const bidder = card.querySelector(".bidder");

  if(a.winner){
    bidder.innerText =
      "🏆 Winner: " + a.winner.user + " ($" + a.winner.amount + ")";
  } else {
    bidder.innerText = "No bids";
  }
});

// ================= INIT =================
if(state.token){
  updateUserUI();
}

</script>

</body>
</html>
