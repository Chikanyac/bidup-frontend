<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp MVP - Zimbabwe Vehicle Auctions</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#0a7c5a;
}
body{
  font-family: Outfit, sans-serif;
  background:#f8fafc;
}
</style>
</head>

<body class="text-slate-800">

<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white border-b">
  <div class="max-w-7xl mx-auto flex items-center justify-between p-4">
    <h1 class="text-2xl font-black text-[var(--brand)]">BidUp</h1>
  </div>
</header>

<!-- HERO -->
<section class="pt-28 bg-gradient-to-br from-[#0a7c5a] to-emerald-700 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-4xl md:text-6xl font-black">
      Zimbabwe Vehicle Auctions
    </h2>
    <p class="mt-4 text-lg">
      Live bidding marketplace
    </p>
  </div>
</section>

<!-- LIVE AUCTIONS -->
<section id="live" class="max-w-7xl mx-auto px-6 py-16">

  <h3 class="text-3xl font-bold mb-6">Live Auctions</h3>

  <div id="auctionContainer" class="grid md:grid-cols-3 gap-6"></div>

</section>

<!-- SELL VEHICLE -->
<section class="bg-slate-50 py-16">
  <div class="max-w-4xl mx-auto px-6">

    <h3 class="text-3xl font-bold mb-6">Sell Your Vehicle</h3>

    <form id="sellForm" class="space-y-3 bg-white p-6 rounded-2xl shadow">

      <input id="carId" class="w-full border p-3 rounded-xl" placeholder="Car ID (unique e.g. aqua_01)" required>

      <input id="title" class="w-full border p-3 rounded-xl" placeholder="Make & Model" required>

      <input id="price" type="number" class="w-full border p-3 rounded-xl" placeholder="Starting Price" required>

      <button class="w-full bg-[var(--brand)] text-white py-3 rounded-xl font-bold">
        Create Auction
      </button>

    </form>

  </div>
</section>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://bidup-phlw.onrender.com");

// =====================
// STATE
// =====================
let auctions = {};

// =====================
// LOAD INITIAL AUCTIONS
// =====================
socket.on("initAuctions", (data) => {
  auctions = {};

  data.forEach(a => {
    auctions[a.carId] = a;
  });

  renderAuctions();
});

// =====================
// NEW AUCTION ARRIVES
// =====================
socket.on("newAuction", (auction) => {
  auctions[auction.carId] = auction;
  renderAuctions();
});

// =====================
// BID UPDATES
// =====================
socket.on("bidUpdate", (data) => {
  const card = document.querySelector(`[data-car-id="${data.carId}"]`);
  if (!card) return;

  const priceEl = card.querySelector(".price");
  priceEl.textContent = "$" + data.amount;

  if (auctions[data.carId]) {
    auctions[data.carId].currentPrice = data.amount;
  }
});

// =====================
// RENDER AUCTIONS
// =====================
function renderAuctions() {
  const container = document.getElementById("auctionContainer");
  container.innerHTML = "";

  Object.values(auctions).forEach(a => {

    container.innerHTML += `
      <div class="bg-white rounded-2xl shadow p-4" data-car-id="${a.carId}">

        <h4 class="font-bold text-lg">${a.title}</h4>

        <p class="text-sm text-slate-500">${a.carId}</p>

        <p class="text-2xl font-black mt-2 price">
          $${a.currentPrice}
        </p>

        <input class="border p-2 w-full mt-3 bidInput" placeholder="Enter bid">

        <button onclick="placeBid('${a.carId}', this)"
          class="mt-2 w-full bg-green-600 text-white py-2 rounded-xl">
          Place Bid
        </button>

      </div>
    `;
  });
}

// =====================
// PLACE BID
// =====================
function placeBid(carId, btn) {
  const card = btn.parentElement;
  const input = card.querySelector(".bidInput");

  const amount = Number(input.value);

  if (!amount || amount <= 0) return;

  socket.emit("placeBid", {
    carId,
    amount,
    user: "Guest"
  });

  input.value = "";
}

// =====================
// SELL VEHICLE FORM
// =====================
document.getElementById("sellForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const carId = document.getElementById("carId").value;
  const title = document.getElementById("title").value;
  const startingPrice = document.getElementById("price").value;

  await fetch("https://bidup-phlw.onrender.com/create-auction", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      carId,
      title,
      startingPrice: Number(startingPrice)
    })
  });

  alert("Auction created!");
  e.target.reset();
});

</script>

</body>
</html>
