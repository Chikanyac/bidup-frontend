<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp Marketplace V3.1</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body { font-family: Outfit, sans-serif; background:#f6f7fb; }
:root { --brand:#0a7c5a; }
.card { transition:0.2s ease; }
.card:hover { transform:translateY(-3px); }
</style>
</head>

<body>

<!-- HEADER -->
<header class="bg-white shadow fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">

    <div>
      <h1 class="text-2xl font-black text-green-700">BidUp</h1>
      <p class="text-xs text-gray-500">BID. WIN. DRIVE.</p>
    </div>

    <div class="flex gap-2">
      <button onclick="showTab('buy')" class="px-3 py-2 text-sm bg-green-600 text-white rounded">Buy Cars</button>
      <button onclick="showTab('sell')" class="px-3 py-2 text-sm bg-gray-800 text-white rounded">Sell Car</button>
      <button onclick="toggleAuth(true)" class="px-3 py-2 text-sm bg-blue-600 text-white rounded">Login</button>
    </div>

  </div>
</header>

<!-- FILTERS -->
<section class="pt-24 max-w-7xl mx-auto px-4">
  <div class="bg-white p-4 rounded shadow flex gap-3 flex-wrap">
    <input placeholder="Make" class="border p-2 rounded">
    <input placeholder="Model" class="border p-2 rounded">
    <input placeholder="Max Price" class="border p-2 rounded">
    <button class="bg-green-600 text-white px-4 rounded">Filter</button>
  </div>
</section>

<!-- BUY TAB -->
<section id="tab-buy" class="max-w-7xl mx-auto px-4 py-6">
  <h2 class="text-xl font-bold mb-4">Live Vehicles</h2>
  <div id="grid" class="grid md:grid-cols-3 gap-4"></div>
</section>

<!-- SELL TAB -->
<section id="tab-sell" class="hidden max-w-2xl mx-auto px-4 py-6">
  <h2 class="text-xl font-bold mb-4">Sell Your Car</h2>

  <input id="title" class="border p-2 w-full mb-2" placeholder="Car Title">
  <input id="price" class="border p-2 w-full mb-2" placeholder="Starting Price">
  <input id="image" class="border p-2 w-full mb-2" placeholder="Image URL">

  <button onclick="submitCar()" class="bg-green-600 text-white px-4 py-2 rounded">
    Submit for Approval
  </button>
</section>

<!-- LOGIN MODAL -->
<div id="auth" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white p-6 rounded w-96">

    <h2 class="font-bold text-lg mb-3">Login</h2>

    <input id="email" class="border p-2 w-full mb-2" placeholder="Email">
    <input id="password" class="border p-2 w-full mb-3" placeholder="Password">

    <button onclick="login()" class="bg-green-600 text-white w-full py-2 rounded">
      Login
    </button>

    <button onclick="toggleAuth(false)" class="mt-3 text-sm w-full">Close</button>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white mt-10 p-10">
  <div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-6 text-sm">

    <div>
      <h3 class="font-bold text-green-400 text-lg">BidUp</h3>
      <p class="text-gray-400">Zimbabwe’s trusted vehicle marketplace</p>
    </div>

    <div>
      <h4 class="font-bold">Quick Links</h4>
      <p>Buy Cars</p>
      <p>Sell Cars</p>
      <p>Auctions</p>
    </div>

    <div>
      <h4 class="font-bold">Support</h4>
      <p>Help Centre</p>
      <p>Terms</p>
    </div>

    <div>
      <h4 class="font-bold">Contact</h4>
      <p>Harare, Zimbabwe</p>
      <p>support@bidup.co.zw</p>
    </div>

  </div>
</footer>

<script>
let currentUser = null;

/* =====================
DUMMY CARS (IMPORTANT)
===================== */
const dummyCars = [
  { _id:"1", title:"Toyota Hilux 2.8 GD6", price:15000, image:"https://source.unsplash.com/400x300/?pickup" },
  { _id:"2", title:"BMW X5 M Sport", price:22000, image:"https://source.unsplash.com/400x300/?bmw" },
  { _id:"3", title:"Mercedes C200", price:18000, image:"https://source.unsplash.com/400x300/?mercedes" }
];

/* =====================
LOAD GRID
===================== */
function loadCars(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  dummyCars.forEach(car=>{
    const div = document.createElement("div");
    div.className = "bg-white p-3 rounded shadow card";

    div.innerHTML = `
      <img src="${car.image}" class="h-40 w-full object-cover rounded">
      <h3 class="font-bold mt-2">${car.title}</h3>
      <p class="text-green-700 font-bold">$${car.price}</p>

      <button onclick="bid('${car._id}', ${car.price})"
        class="mt-2 w-full bg-green-600 text-white py-2 rounded">
        Place Bid
      </button>
    `;

    grid.appendChild(div);
  });
}

/* =====================
TABS
===================== */
function showTab(tab){
  document.querySelectorAll("section[id^='tab']").forEach(s=>s.classList.add("hidden"));
  document.getElementById("tab-"+tab).classList.remove("hidden");
}

/* =====================
AUTH
===================== */
function toggleAuth(show){
  document.getElementById("auth").classList.toggle("hidden", !show);
}

async function login(){
  const res = await fetch("/api/auth/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    currentUser = data.user;
    toggleAuth(false);
    alert("Logged in");
  }
}

/* =====================
SELL CAR (PENDING)
===================== */
async function submitCar(){
  const token = localStorage.getItem("token");

  if(!token){
    alert("Login required to sell");
    toggleAuth(true);
    return;
  }

  await fetch("/api/seller/auctions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({
      title: title.value,
      startingPrice: price.value,
      image: image.value
    })
  });

  alert("Submitted for admin approval");
}

/* =====================
BID (LOGIN REQUIRED)
===================== */
function bid(id, price){
  if(!localStorage.getItem("token")){
    alert("Login required to bid");
    toggleAuth(true);
    return;
  }

  alert("Bid placed (backend will connect next step)");
}

/* INIT */
loadCars();
</script>

</body>
</html>
