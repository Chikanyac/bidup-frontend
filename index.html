<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp V2 - Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#0a7c5a;
}
body{font-family:Outfit, sans-serif; background:#f8fafc;}
.glass{backdrop-filter:blur(14px);}
</style>
</head>

<body class="text-slate-800">

<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 glass border-b">
  <div class="max-w-7xl mx-auto flex items-center justify-between p-4">

    <div>
      <h1 class="text-2xl font-black text-[var(--brand)]">BidUp V2</h1>
      <span class="text-xs font-bold text-green-700">Marketplace Dashboard</span>
    </div>

    <div class="flex items-center gap-3">
      <div id="userBadge" class="hidden font-bold text-green-700"></div>

      <button id="loginBtn" onclick="toggleAuth(true)"
        class="bg-[var(--brand)] text-white px-4 py-2 rounded-xl text-sm font-bold">
        Login
      </button>

      <button id="logoutBtn" onclick="logout()"
        class="hidden bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">
        Logout
      </button>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="pt-28 bg-gradient-to-br from-[#0a7c5a] to-emerald-700 text-white">
  <div class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-4xl md:text-5xl font-black">
      Live Vehicle Auctions
    </h2>
  </div>
</section>

<!-- AUCTION DASHBOARD -->
<section class="max-w-7xl mx-auto px-6 py-10">

  <div class="flex justify-between items-center mb-6">
    <h3 class="text-2xl font-bold">Live Auctions</h3>

    <!-- CREATE AUCTION BUTTON (ADMIN/Seller ready) -->
    <button onclick="openCreateAuction()"
      class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold">
      + Create Auction
    </button>
  </div>

  <div id="auctionGrid" class="grid md:grid-cols-3 gap-6">
    <div class="text-slate-500">Loading auctions...</div>
  </div>
</section>

<!-- CREATE AUCTION MODAL -->
<div id="createModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-2xl w-full max-w-md">

    <h2 class="text-xl font-bold mb-4">Create Auction</h2>

    <input id="title" class="w-full border p-2 rounded mb-2" placeholder="Car title">
    <input id="image" class="w-full border p-2 rounded mb-2" placeholder="Image URL">
    <input id="price" type="number" class="w-full border p-2 rounded mb-2" placeholder="Starting price">
    <input id="duration" type="number" class="w-full border p-2 rounded mb-2" placeholder="Duration (mins)">

    <button onclick="createAuction()"
      class="w-full bg-green-600 text-white py-2 rounded-xl font-bold">
      Create
    </button>

    <button onclick="toggleCreate(false)" class="mt-2 text-sm w-full">
      Close
    </button>

  </div>
</div>

<!-- LOGIN MODAL -->
<div id="authModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl">

    <h2 class="text-xl font-bold mb-4">Login / Register</h2>

    <input id="email" class="w-full border p-2 rounded mb-2" placeholder="Email">
    <input id="password" type="password" class="w-full border p-2 rounded mb-2" placeholder="Password">

    <button onclick="login()" class="w-full bg-green-600 text-white py-2 rounded mb-2">
      Login
    </button>

    <button onclick="register()" class="w-full bg-slate-800 text-white py-2 rounded">
      Register
    </button>

  </div>
</div>

<script>
const socket = io("https://api.bidup.co.zw", {
  transports: ["websocket", "polling"]
});

let currentUser = JSON.parse(localStorage.getItem("user")) || null;

/* =====================
   SOCKET INIT
===================== */
socket.on("connect", () => {
  console.log("Connected:", socket.id);
  socket.emit("getLiveAuctions");
});

/* =====================
   AUCTIONS
===================== */
function createCarCard(car){
  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-xl shadow";
  div.dataset.id = car._id;

  div.innerHTML = `
    <img src="${car.image || ''}" class="h-40 w-full object-cover rounded mb-2">

    <h3 class="font-bold">${car.title}</h3>

    <p class="text-green-700 font-bold current"
       data-price="${car.currentPrice}">
      $${car.currentPrice}
    </p>

    <div class="text-red-600 font-bold text-sm mt-1 timer"></div>

    <button onclick="bid(this)"
      class="mt-3 bg-green-600 text-white w-full py-2 rounded">
      Place Bid
    </button>
  `;

  socket.emit("joinAuction", car._id);

  /* =====================
     TIMER (STEP 6 & 7)
  ====================== */
  const timerEl = div.querySelector(".timer");

  function updateTimer(){
    const diff = new Date(car.endTime) - new Date();

    if(diff <= 0){
      timerEl.innerText = "Auction Ended";
      return;
    }

    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    timerEl.innerText = `Ends in ${mins}m ${secs}s`;
  }

  setInterval(updateTimer, 1000);
  updateTimer();

  return div;
}

/* =====================
   SOCKET EVENTS
===================== */
socket.on("initAuctions", (auctions)=>{
  const grid = document.getElementById("auctionGrid");
  grid.innerHTML = "";

  if(!auctions.length){
    grid.innerHTML = "No auctions yet";
    return;
  }

  auctions.forEach(a => grid.appendChild(createCarCard(a)));
});

socket.on("bidUpdated", (data)=>{
  const card = document.querySelector(`[data-id="${data.auctionId}"]`);
  if(!card) return;

  const priceEl = card.querySelector(".current");
  priceEl.dataset.price = data.currentPrice;
  priceEl.textContent = "$" + Number(data.currentPrice).toLocaleString();
});

/* =====================
   BID
===================== */
function bid(btn){
  if(!currentUser){
    alert("Login required");
    return;
  }

  const card = btn.closest("[data-id]");
  const priceEl = card.querySelector(".current");

  const newPrice = parseInt(priceEl.dataset.price) + 100;

  socket.emit("placeBid", {
    auctionId: card.dataset.id,
    bidAmount: newPrice,
    userId: currentUser._id
  });
}

/* =====================
   CREATE AUCTION
===================== */
function openCreateAuction(){
  document.getElementById("createModal").classList.remove("hidden");
}

function toggleCreate(state){
  document.getElementById("createModal").classList.toggle("hidden", !state);
}

async function createAuction(){
  const res = await fetch("https://api.bidup.co.zw/api/auctions/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      title: title.value,
      image: image.value,
      startingPrice: price.value,
      durationMinutes: duration.value
    })
  });

  const data = await res.json();

  alert("Auction created");
  toggleCreate(false);
  socket.emit("getLiveAuctions");
}

/* =====================
   AUTH
===================== */
async function login(){
  const res = await fetch("https://api.bidup.co.zw/api/auth/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("user", JSON.stringify(data.user));
    currentUser = data.user;
    document.getElementById("authModal").classList.add("hidden");
  }
}

async function register(){
  await fetch("https://api.bidup.co.zw/api/auth/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: email.value.split("@")[0],
      email: email.value,
      password: password.value
    })
  });

  alert("Registered");
}
</script>

</body>
</html>
