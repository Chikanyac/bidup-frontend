<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BidUp - Production Auctions</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family: Outfit, sans-serif;
  background:#f8fafc;
}
:root{
  --brand:#0a7c5a;
}
.glass{
  backdrop-filter: blur(12px);
}
.status-live{color:#16a34a;}
.status-ending{color:#f59e0b;}
.status-closed{color:#ef4444;}
</style>
</head>

<body class="text-slate-800">

<!-- ================= HEADER ================= -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 glass border-b">
  <div class="max-w-7xl mx-auto flex items-center justify-between p-4">

    <div>
      <h1 class="text-2xl font-black text-[var(--brand)]">BidUp</h1>
      <p class="text-[10px] font-bold tracking-widest text-emerald-700">BID. WIN. DRIVE.</p>
    </div>

    <div class="flex items-center gap-3">

      <div id="userBadge" class="text-sm font-bold"></div>

      <button id="authBtn"
        onclick="toggleAuth(true)"
        class="bg-[var(--brand)] text-white px-4 py-2 rounded-xl text-sm font-bold">
        Login
      </button>

      <button id="logoutBtn"
        onclick="logout()"
        class="hidden bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">
        Logout
      </button>

    </div>

  </div>
</header>

<!-- ================= HERO ================= -->
<section class="pt-28 bg-gradient-to-br from-[#0a7c5a] to-emerald-700 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-5xl font-black">Live Vehicle Auctions</h2>
    <p class="mt-2 text-white/80">Real-time bidding. Real winners.</p>
  </div>
</section>

<!-- ================= AUCTIONS ================= -->
<section class="max-w-7xl mx-auto px-6 py-10">

  <div id="auctionGrid" class="grid md:grid-cols-3 gap-6"></div>

</section>

<!-- ================= LOGIN MODAL ================= -->
<div id="authModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl">

    <h2 class="text-xl font-bold mb-4">Login</h2>

    <input id="email" class="w-full border p-3 rounded-xl mb-3" placeholder="Email">
    <input id="password" type="password" class="w-full border p-3 rounded-xl mb-3" placeholder="Password">

    <button onclick="login()"
      class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
      Login
    </button>

    <button onclick="register()"
      class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold mt-2">
      Register
    </button>

    <button onclick="toggleAuth(false)"
      class="w-full mt-3 text-sm text-slate-500">
      Close
    </button>

  </div>
</div>

<script>

const socket = io("https://bidup-phlw.onrender.com");

const state = {
  user: null,
  token: localStorage.getItem("token"),
  auctions: []
};

// ================= AUTH =================
function toggleAuth(show){
  document.getElementById("authModal").classList.toggle("hidden", !show);
}

async function register(){
  await fetch("https://bidup-phlw.onrender.com/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Registered");
}

async function login(){
  const res = await fetch("https://bidup-phlw.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    state.token = data.token;
    state.user = data.user;

    localStorage.setItem("token", data.token);

    updateUserUI();
    toggleAuth(false);
  }
}

// ================= USER UI =================
function updateUserUI(){
  if(state.user){
    userBadge.innerText = "👤 " + state.user.name;
    authBtn.classList.add("hidden");
    logoutBtn.classList.remove("hidden");
  }
}

function logout(){
  localStorage.removeItem("token");
  state.user = null;
  state.token = null;

  userBadge.innerText = "";
  authBtn.classList.remove("hidden");
  logoutBtn.classList.add("hidden");
}

// ================= AUCTION CARD =================
function createCard(a){

  const div = document.createElement("div");
  div.className = "bg-white p-4 rounded-2xl shadow";
  div.dataset.id = a.carId;

  const statusClass =
    a.status === "live" ? "status-live" :
    a.status === "ending" ? "status-ending" :
    "status-closed";

  div.innerHTML = `
    <img src="${a.image}" class="rounded-xl h-40 w-full object-cover"/>

    <h3 class="font-bold mt-2">${a.title}</h3>

    <p class="text-xl font-black current" data-price="${a.currentPrice}">
      $${a.currentPrice}
    </p>

    <p class="${statusClass} font-bold text-sm status">
      ${a.status.toUpperCase()}
    </p>

    <p class="text-xs text-slate-500 bidder">Highest Bidder: -</p>

    <p class="text-xs text-red-500 countdown" data-end="${a.endsAt}">
      loading...
    </p>

    <button onclick="bid(this)"
      class="mt-3 w-full bg-[var(--brand)] text-white py-2 rounded-xl">
      Place Bid
    </button>
  `;

  return div;
}

// ================= RENDER =================
function render(list){
  auctionGrid.innerHTML = "";
  list.forEach(a => auctionGrid.appendChild(createCard(a)));
}

// ================= BID =================
function bid(btn){

  const card = btn.closest("[data-id]");
  const priceEl = card.querySelector(".current");

  let price = parseInt(priceEl.dataset.price) + 100;

  if(!state.token){
    alert("Login required");
    toggleAuth(true);
    return;
  }

  socket.emit("placeBid", {
    carId: card.dataset.id,
    amount: price,
    token: state.token
  });
}

// ================= SOCKET =================
socket.on("initAuctions", render);

socket.on("newAuction", (a) => {
  auctionGrid.appendChild(createCard(a));
});

socket.on("bidUpdate", (d) => {

  const card = document.querySelector(`[data-id="${d.carId}"]`);
  if(!card) return;

  card.querySelector(".current").innerText = "$" + d.amount;
  card.querySelector(".current").dataset.price = d.amount;

  card.querySelector(".bidder").innerText =
    "Highest Bidder: " + d.user;
});

// ================= AUCTION CLOSED =================
socket.on("auctionClosed", (a) => {

  const card = document.querySelector(`[data-id="${a.carId}"]`);
  if(!card) return;

  card.querySelector(".status").innerText = "CLOSED";
  card.querySelector(".status").className = "status-closed font-bold";

  card.querySelector("button").disabled = true;
  card.querySelector("button").innerText = "Closed";

  if(a.winner){
    card.querySelector(".bidder").innerText =
      "🏆 Winner: " + a.winner.user + " ($" + a.winner.amount + ")";
  }
});

// ================= COUNTDOWN =================
setInterval(() => {

  document.querySelectorAll(".countdown").forEach(el => {

    const end = new Date(el.dataset.end);
    const diff = end - new Date();

    if(diff <= 0){
      el.innerText = "Ended";
      return;
    }

    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    el.innerText = `Ends in ${m}:${s.toString().padStart(2,"0")}`;
  });

}, 1000);

// ================= INIT =================
if(state.token){
  updateUserUI();
}

</script>

</body>
</html>
