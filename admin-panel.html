<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Panel</h1>

  <button onclick="load()" class="bg-green-600 text-white px-4 py-2 rounded">
    Refresh
  </button>

  <div id="users" class="mt-4"></div>
  <div id="auctions" class="mt-4"></div>
</div>

<script>
const token = localStorage.getItem("token");

async function load(){

  const users = await fetch("/api/admin/users", {
    headers:{ Authorization:"Bearer "+token }
  }).then(r=>r.json());

  document.getElementById("users").innerHTML =
    "<h2 class='font-bold'>Users</h2>" +
    users.map(u=>`<p>${u.name} (${u.email})</p>`).join("");

  const auctions = await fetch("/api/admin/auctions", {
    headers:{ Authorization:"Bearer "+token }
  }).then(r=>r.json());

  document.getElementById("auctions").innerHTML =
    "<h2 class='font-bold mt-4'>Auctions</h2>" +
    auctions.map(a=>`<p>${a.title} - ${a.status}</p>`).join("");
}

load();
</script>

</body>
</html>
