<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard - BidUp V5</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="bg-slate-100">

<header class="bg-white p-4 shadow flex justify-between items-center">
  <h1 class="font-bold text-green-700 text-xl">Seller Dashboard</h1>
  <button onclick="logout()" class="text-red-500 font-bold">Logout</button>
</header>

<div class="max-w-6xl mx-auto p-6">

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl">
      Total Auctions: <span id="total">0</span>
    </div>
    <div class="bg-white p-4 rounded-xl">
      Active: <span id="active">0</span>
    </div>
    <div class="bg-white p-4 rounded-xl">
      Closed: <span id="closed">0</span>
    </div>
  </div>

  <!-- CREATE AUCTION -->
  <div class="bg-white p-4 rounded-xl mb-6">
    <h2 class="font-bold mb-3">Create Auction</h2>

    <input id="title" class="w-full border p-2 mb-2" placeholder="Title">
    <input id="price" class="w-full border p-2 mb-2" placeholder="Starting Price">

    <!-- FIXED: FILE UPLOAD -->
    <input id="image" type="file" accept="image/*" class="w-full border p-2 mb-2">

    <button onclick="createAuction()" class="bg-green-600 text-white px-4 py-2 rounded">
      Create Auction
    </button>
  </div>

  <!-- AUCTIONS LIST -->
  <div id="list" class="grid md:grid-cols-3 gap-4"></div>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  alert("Login required");
  window.location.href = "/";
}

// =====================
// LOAD SELLER DATA
// =====================
async function load() {
  const res = await fetch("https://api.bidup.co.zw/api/seller/auctions", {
    headers: {
      Authorization: "Bearer " + token
    }
  });

  const data = await res.json();

  document.getElementById("list").innerHTML = "";

  let active = 0;
  let closed = 0;

  data.forEach(a => {
    if (a.status === "live") active++;
    else closed++;

    const div = document.createElement("div");
    div.className = "bg-white p-3 rounded-xl shadow";

    div.innerHTML = `
      <h3 class="font-bold">${a.title}</h3>
      <p class="text-sm">Current: $${a.currentPrice}</p>
      <p class="text-xs text-gray-500">Status: ${a.status}</p>
    `;

    document.getElementById("list").appendChild(div);
  });

  document.getElementById("total").textContent = data.length;
  document.getElementById("active").textContent = active;
  document.getElementById("closed").textContent = closed;
}

// =====================
// CREATE AUCTION (FIXED V5)
// =====================
async function createAuction() {
  const form = new FormData();

  form.append("carId", Date.now().toString());
  form.append("title", document.getElementById("title").value);
  form.append("startingPrice", document.getElementById("price").value);

  const file = document.getElementById("image").files[0];
  form.append("image", file);

  const res = await fetch("https://api.bidup.co.zw/api/auctions/create", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    },
    body: form
  });

  const data = await res.json();
  console.log("Auction created:", data);

  alert("Auction created successfully!");
  load();
}
  const socket = io("https://api.bidup.co.zw");

socket.on("bidUpdate", (data) => {
  load(); // simple refresh (upgrade later to partial update)
});

socket.on("auctionApproved", (auction) => {
  alert("Auction approved: " + auction.title);
  load();
});

socket.on("auctionClosed", (auction) => {
  alert("Auction closed: " + auction.title);
  load();
});

// =====================
// LOGOUT
// =====================
function logout() {
  localStorage.clear();
  window.location.href = "/";
}

// INITIAL LOAD
load();
</script>

</body>
</html>
