<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp Seller Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: Outfit, sans-serif;
  background: #f8fafc;
}
</style>
</head>

<body class="text-slate-800">

<!-- HEADER -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-emerald-700">BidUp Seller Dashboard</h1>

  <div class="flex gap-3 items-center">
    <span id="userBadge" class="text-sm text-slate-600"></span>
    <button onclick="logout()" class="text-sm bg-red-500 text-white px-3 py-1 rounded-lg">
      Logout
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="max-w-6xl mx-auto p-6 grid md:grid-cols-2 gap-6">

  <!-- CREATE AUCTION -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-lg font-bold mb-4">Create Auction</h2>

    <input id="title" class="w-full border p-3 rounded-lg mb-3" placeholder="Car Title">
    <input id="year" class="w-full border p-3 rounded-lg mb-3" placeholder="Year / Model">
    <input id="startingPrice" class="w-full border p-3 rounded-lg mb-3" placeholder="Starting Price">
    <input id="image" class="w-full border p-3 rounded-lg mb-3" placeholder="Image URL">

    <button onclick="createAuction()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">
      Create Auction
    </button>
  </div>

  <!-- MY AUCTIONS -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-lg font-bold mb-4">My Auctions</h2>

    <button onclick="loadMyAuctions()" class="mb-3 text-sm text-emerald-600">
      Refresh
    </button>

    <div id="myAuctions" class="space-y-3 text-sm text-slate-700">
      Loading...
    </div>
  </div>

</div>

<script>
const API = "https://bidup-phlw.onrender.com";
const socket = io(API);

let token = localStorage.getItem("token");
let user = JSON.parse(localStorage.getItem("user") || "null");

// =======================
// AUTH CHECK
// =======================
if (!token) {
  alert("Please login first");
  window.location.href = "/";
}

if (user) {
  document.getElementById("userBadge").textContent = "Logged in as " + user.name;
}

// =======================
// LOGOUT
// =======================
function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "/";
}

// =======================
// CREATE AUCTION
// =======================
async function createAuction(){

  const res = await fetch(API + "/create-auction", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      token,
      carId: Date.now().toString(),
      title: document.getElementById("title").value,
      startingPrice: Number(document.getElementById("startingPrice").value),
      image: document.getElementById("image").value
    })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  alert("Auction created!");
  loadMyAuctions();
}

// =======================
// LOAD SELLER AUCTIONS
// =======================
async function loadMyAuctions(){

  const res = await fetch(API + "/seller/auctions", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();

  const container = document.getElementById("myAuctions");

  if (!Array.isArray(data)) {
    container.innerHTML = "No auctions found";
    return;
  }

  container.innerHTML = data.map(a => {

    return `
      <div class="border p-3 rounded-lg">
        <div class="font-bold">${a.title}</div>
        <div>Current: $${a.currentPrice}</div>
        <div>Status: <b>${a.status}</b></div>

        ${a.status === "closed" && a.winner ? `
          <div class="text-emerald-600 mt-1">
            Winner: ${a.winner.user} ($${a.winner.amount})
          </div>
        ` : ""}
      </div>
    `;
  }).join("");
}

// =======================
// REALTIME UPDATES
// =======================
socket.on("bidUpdate", () => {
  loadMyAuctions();
});

socket.on("auctionClosed", () => {
  loadMyAuctions();
});

// =======================
// INIT
// =======================
loadMyAuctions();
</script>

</body>
</html>
