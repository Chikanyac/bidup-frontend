<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidUp Seller Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: sans-serif;
  background: #f8fafc;
}
</style>
</head>

<body class="p-6">

<!-- HEADER -->
<h1 class="text-3xl font-bold text-green-700 mb-6">
  BidUp Seller Dashboard
</h1>

<!-- FORM -->
<div class="bg-white p-6 rounded-2xl shadow max-w-xl space-y-3">

  <input id="title" class="w-full border p-3 rounded-xl" placeholder="Car Title (e.g Toyota Aqua)">
  
  <input id="year" class="w-full border p-3 rounded-xl" placeholder="Year / Spec (e.g 2019 Hybrid)">
  
  <input id="startingPrice" class="w-full border p-3 rounded-xl" placeholder="Starting Price">

  <input id="image" class="w-full border p-3 rounded-xl" placeholder="Image URL">

  <button onclick="createAuction()" 
          class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
    Create Auction
  </button>

  <p id="status" class="text-sm text-slate-500"></p>
</div>

<script>
// ======================
// CREATE AUCTION
// ======================
async function createAuction(){

  const status = document.getElementById("status");
  status.textContent = "Creating auction...";

  const title = document.getElementById("title").value;
  const year = document.getElementById("year").value;
  const startingPrice = document.getElementById("startingPrice").value;
  const image = document.getElementById("image").value;

  // Basic validation
  if(!title || !startingPrice){
    status.textContent = "Please fill required fields";
    return;
  }

  try {
    const res = await fetch("https://bidup-phlw.onrender.com/create-auction", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        carId: Date.now().toString(),
        title,
        year,
        startingPrice: Number(startingPrice),
        image
      })
    });

    const data = await res.json();

    if(data.success){
      status.textContent = "Auction created successfully!";
      document.getElementById("title").value = "";
      document.getElementById("year").value = "";
      document.getElementById("startingPrice").value = "";
      document.getElementById("image").value = "";
    } else {
      status.textContent = "Failed to create auction";
    }

  } catch (err) {
    console.log(err);
    status.textContent = "Server error. Try again.";
  }
}
</script>

</body>
</html>
